<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>arsip-retrospring</title>

<style>
body{margin:0;font-family:-apple-system;background:#f5f5f5;}

h1{
  font-size:1em;
  font-weight:normal;
  text-align:center;
  padding:15px;
}

.content{
  padding:20px;
}

/* NAV */
.bottom-bar{
  position:fixed;
  bottom:20px;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  box-sizing:border-box;
}

.home{
  width:50px;
  height:50px;
  background:black;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.home svg{fill:white;}

.nav-buttons{
  display:flex;
  gap:10px;
}

.arrow{
  width:45px;
  height:45px;
  background:black;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.arrow svg{
  fill:none;
  stroke:white;
  stroke-width:3;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.page-number{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
}
</style>
</head>

<body>

<h1>arsip-retrospring</h1>

<div class="content" id="content">Loading...</div>

<div class="page-number" id="pageNum"></div>

<div class="bottom-bar">

<a href="index.html" class="home">
<svg viewBox="0 0 24 24" width="22">
<path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/>
</svg>
</a>

<div class="nav-buttons" id="nav"></div>

</div>

<script>
let params = new URLSearchParams(location.search);
let page = parseInt(params.get("p")) || 1;
const total = 31;

if(page < 1) page = 1;
if(page > total) page = total;

// load isi file
fetch(page + "retro.html")
.then(r => r.text())
.then(data => {
  document.getElementById("content").innerHTML = data;
});

// nomor
document.getElementById("pageNum").innerText = page + " / " + total;

// nav
let nav = "";

if(page > 1){
nav += `<a href="?p=${page-1}" class="arrow">
<svg viewBox="0 0 24 24"><path d="M14 6l-6 6 6 6"/></svg>
</a>`;
}

if(page < total){
nav += `<a href="?p=${page+1}" class="arrow">
<svg viewBox="0 0 24 24"><path d="M10 6l6 6-6 6"/></svg>
</a>`;
}

document.getElementById("nav").innerHTML = nav;
</script>

</body>
</html>
