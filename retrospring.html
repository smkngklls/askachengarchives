<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arsip-retrospring</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
}

/* container utama */
.container {
  max-width: 500px;
  margin: auto;
  background: #000;
}

/* header merah */
.header {
  background: #a40000;
  color: white;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

/* card profil */
.profile {
  background: #eee;
  margin: 15px;
  border-radius: 12px;
  padding: 15px;
}

/* nama */
.name {
  font-weight: bold;
  font-size: 20px;
}

/* username */
.username {
  color: #a40000;
}

/* BIO DIKOSONGKAN */
.bio {
  display: none;
}

/* HAPUS LINK & ICON */
.profile a,
.profile svg,
.profile i {
  display: none;
}

/* HAPUS ASK BOX */
.ask-box,
form,
textarea,
input,
button {
  display: none;
}

/* HAPUS LOAD MORE */
.load-more {
  display: none;
}

/* section answer */
.section {
  background: #fff;
  margin: 15px;
  border-radius: 12px;
  overflow: hidden;
}

/* header answer */
.section-header {
  background: #a40000;
  color: white;
  padding: 10px;
  text-align: center;
}

/* item */
.item {
  padding: 15px;
  border-bottom: 1px solid #ddd;
}

.question {
  color: #333;
  margin-bottom: 10px;
}

.answer {
  background: #f2f2f2;
  padding: 10px;
  border-radius: 8px;
}

</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">Retrospring</div>

  <!-- PROFILE -->
  <div class="profile">
    <div class="name">ACHENG</div>
    <div class="username">doinglaundry_</div>

    <!-- BIO DIKOSONGKAN -->
    <div class="bio"></div>
  </div>

  <!-- ANSWERS -->
  <div class="section">
    <div class="section-header">Answers</div>

    <div class="item">
      <div class="question">gtau</div>
      <div class="answer">Sama.</div>
    </div>

    <div class="item">
      <div class="question">Wkwkwk baca ulang kumpulan Luzo mu sampe 10 kali</div>
      <div class="answer">Thanks ya 🤍</div>
    </div>

  </div>

</div>

</body>
</html>
