<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arsip-retrospring</title>

<style>
/* ===== RESET ===== */
body {
  margin: 0;
  padding: 0;
}

/* ===== HAPUS BAGIAN YANG TIDAK DIINGINKAN ===== */

/* HAPUS TEKS BIO (TAPI BOX TETAP ADA) */
.profile-card p,
.profile-card .bio {
  visibility: hidden;
}

/* HAPUS LINK + ICON BUMI */
.profile-card a,
.profile-card svg,
.profile-card i {
  display: none !important;
}

/* HAPUS ASK BOX */
form,
textarea,
input,
.ask-box,
button[type="submit"] {
  display: none !important;
}

/* HAPUS LOAD MORE */
button,
.load-more,
a[href*="more"] {
  display: none !important;
}

</style>
</head>

<body>

<!-- ===== ISI ASLI HTML KAMU ===== -->
<!-- PASTE SELURUH ISI FILE RETROSPRING KAMU DI SINI -->
<!-- (mulai dari header retrospring sampai list Q&A) -->


<script>
window.addEventListener("load", function () {

  // Kosongkan bio (tanpa hapus box)
  document.querySelectorAll(".profile-card p").forEach(el => {
    el.innerText = "";
  });

  // Hapus link + icon bumi
  document.querySelectorAll(".profile-card a, .profile-card svg, .profile-card i")
    .forEach(el => el.remove());

  // Hapus ask box
  document.querySelectorAll("form, textarea, input, .ask-box")
    .forEach(el => el.remove());

  // Hapus tombol load more
  document.querySelectorAll("button, a").forEach(el => {
    if (el.innerText.toLowerCase().includes("load")) {
      el.remove();
    }
  });

});
</script>

</body>
</html>
