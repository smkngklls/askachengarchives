<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>arsip-retrospring</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#f5f5f5;
  text-align:center;
}

h1 {
  padding:15px;
  font-size:1em;
  font-weight:normal;
}

iframe {
  width:100%;
  height:60vh;
  border:none;
}

.nav a {
  margin:5px;
  padding:6px 10px;
  background:black;
  color:white;
  border-radius:4px;
  text-decoration:none;
}

.nav span {
  display:block;
  margin:10px 0;
}

.home-button {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:black;
  border-radius:50%;
}

.home-button svg {
  fill:white;
}
</style>
</head>

<body>

<h1>arsip-retrospring</h1>

<iframe id="frame"></iframe>

<div class="nav" id="nav"></div>

<a href="index.html" class="home-button">
<svg viewBox="0 0 24 24" width="22">
<path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/>
</svg>
</a>

<script>
// ambil page dari URL (?p=)
let params = new URLSearchParams(window.location.search);
let page = parseInt(params.get("p")) || 1;

const total = 31;

// validasi biar tidak keluar range
if (page < 1) page = 1;
if (page > total) page = total;

function render() {
  // tampilkan file
  document.getElementById("frame").src = page + "retro.html";

  let html = "";

  if (page > 1) {
    html += `<a href="?p=${page-1}">Prev</a>`;
  }

  html += `<span>${page} / ${total}</span>`;

  if (page < total) {
    html += `<a href="?p=${page+1}">Next</a>`;
  }

  document.getElementById("nav").innerHTML = html;
}

render();
</script>

</body>
</html>
