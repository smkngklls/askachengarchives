<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>retrospring</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:sans-serif; text-align:center; }

.topbar {
  padding: 10px;
}

.topbar button {
  padding: 8px 12px;
  border: none;
  background: black;
  color: white;
  border-radius: 8px;
}

iframe { width:100%; height:80vh; border:none; }

.nav { padding:10px; }

.nav button {
  padding:10px;
  margin:5px;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="location.href='index.html'">⬅ Home</button>
</div>

<h2>arsip-retrospring</h2>

<iframe id="viewer"></iframe>

<div class="nav">
  <button onclick="prev()">⬅ Prev</button>
  <span id="page"></span>
  <button onclick="next()">Next ➡</button>
</div>

<script>
let current = 1;
let start = 1;
let end = 31;

function update() {
  viewer.src = current + "retro.html";
  page.textContent = current;
}

function next(){ if(current<end){ current++; update(); } }
function prev(){ if(current>start){ current--; update(); } }

update();
</script>

</body>
</html>
