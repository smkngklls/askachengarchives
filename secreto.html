<script>
let page = 1;
const total = 3;

function render() {
  document.getElementById("content").innerHTML = "Halaman " + page;

  let html = "";
  if (page > 1) html += `<a onclick="page--;render()">Prev</a>`;
  html += `<span>${page} / ${total}</span>`;
  if (page < total) html += `<a onclick="page++;render()">Next</a>`;

  document.getElementById("nav").innerHTML = html;
}

render();
</script>
