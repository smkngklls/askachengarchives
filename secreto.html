<script>
let params = new URLSearchParams(location.search);
let page = parseInt(params.get("p")) || 1;
const total = 3;

if(page < 1) page = 1;
if(page > total) page = total;

let real = 31 + page;

fetch(real + "retro.html")
.then(r => r.text())
.then(data => {
  document.getElementById("content").innerHTML = data;
});

document.getElementById("pageNum").innerText = page + " / " + total;

let nav = "";

if(page > 1){
nav += `<a href="?p=${page-1}" class="arrow"><svg viewBox="0 0 24 24"><path d="M14 6l-6 6 6 6"/></svg></a>`;
}

if(page < total){
nav += `<a href="?p=${page+1}" class="arrow"><svg viewBox="0 0 24 24"><path d="M10 6l6 6-6 6"/></svg></a>`;
}

document.getElementById("nav").innerHTML = nav;
</script>
