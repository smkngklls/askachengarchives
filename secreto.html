<script>
let page = new URLSearchParams(location.search).get('p') || 1;
page = parseInt(page);

const real = 31 + page; // 32–34

let html = "";
if(page > 1) html += `<a href="?p=${page-1}">Prev</a>`;
html += `<span>${page} / 3</span>`;
if(page < 3) html += `<a href="?p=${page+1}">Next</a>`;

document.getElementById("nav").innerHTML = html;

location.href = real + "retro.html";
</script>
