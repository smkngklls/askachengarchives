<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Q&A Archive</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f5f6fa;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

.header {
  text-align: center;
  padding: 15px;
  font-weight: bold;
  font-size: 18px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* label anonymous */
.anon {
  font-size: 12px;
  color: #888;
  margin-bottom: 5px;
}

/* pertanyaan */
.question {
  background: #eeeeee;
  padding: 10px;
  border-radius: 10px;
  font-size: 14px;
  color: #333;
  margin-bottom: 10px;
}

/* jawaban */
.answer {
  background: #ff3b6b;
  color: white;
  padding: 10px;
  border-radius: 10px;
  font-size: 14px;
}

/* waktu opsional */
.time {
  font-size: 11px;
  color: #999;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">Q&A Archive</div>

  <!-- ITEM 1 -->
  <div class="card">
    <div class="anon">Anonymous</div>
    <div class="question">
      aaa butuh kelanjutan alpha Kuna dan omega uji, love your sukuita au🫶
    </div>

    <div class="answer">
      Bonusnya narasi porno Yuuji hamil diewe Sukuna.

Terima kasih!
    </div>

    <div class="time">29 Apr 2026</div>
  </div>

  <!-- ITEM 2 -->
  <div class="card">
    <div class="anon">Anonymous</div>
    <div class="question">
      kapan update lagi?
    </div>

    <div class="answer">
      ntar ya (gatau kapan 😭)
    </div>
  </div>

</div>

</body>
</html>
