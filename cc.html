<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arsip-cc</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#ffffff;
}

/* 🔥 FULL WIDTH FIX */
#content{
  margin:0;
  padding:0;
}

#content *{
  box-sizing:border-box;
}

/* HILANGKAN CELAH KIRI KANAN */
#content > *{
  margin-left:0 !important;
  margin-right:0 !important;
  max-width:100% !important;
}

/* PAKSA CONTAINER JADI FULL */
#content div{
  max-width:100% !important;
  width:100% !important;
}

/* GAMBAR */
#content img{
  max-width:100%;
  height:auto;
}

/* HOME BUTTON */
.home{
  position:fixed;
  bottom:20px;
  left:20px;
  width:50px;
  height:50px;
  background:black;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.home svg{
  fill:white;
}
</style>
</head>

<body>

<div id="content">Loading...</div>

<a href="index.html" class="home">
  <svg viewBox="0 0 24 24" width="22">
    <path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/>
  </svg>
</a>

<script>
fetch("35retro.html")
.then(r => r.text())
.then(data => {
  document.getElementById("content").innerHTML = data;
});
</script>

</body>
</html>
