<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Page</title>

<style>
/* BASE */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  font-size: 16px;
  scroll-behavior: smooth;
}

/* HEADER = SAMA SEPERTI TEKS */
h1, h2, h3, h4, h5, h6 {
  font-size: 1em;
  font-weight: normal;
  margin: 0;
}

/* TEXT */
p {
  font-size: 0.95em;
  margin: 5px 0;
}

/* SECTION */
section {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

/* WARNA */
#home { background: #f5f5f5; }
.page { background: #eaeaea; }

/* NAV */
.nav-btn {
  margin-top: 20px;
  text-align: center;
}

.nav-btn a {
  text-decoration: none;
  padding: 6px 10px;
  margin: 0 5px;
  background: black;
  color: white;
  border-radius: 4px;
  font-size: 0.9em;
}

.nav-btn span {
  display: block;
  margin: 8px 0;
}

/* HOME BUTTON (ICON ONLY) */
.home-button {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);

  width: 50px;
  height: 50px;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 50%;
  text-decoration: none;

  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);

  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.home-button:hover {
  transform: translateX(-50%) scale(1.1);
}
</style>
</head>

<body>

<!-- HOME -->
<section id="home">
  <h1>Home</h1>
  <p>Halaman utama</p>
</section>

<!-- ===== SECTION A ===== -->

<section id="a1" class="page">
  <h1>Bagian A</h1>

  <div class="nav-btn">
    <span>1 / 3</span>
    <a href="#a2">Next</a>
  </div>
</section>

<section id="a2" class="page">
  <h1>Bagian A</h1>

  <div class="nav-btn">
    <a href="#a1">Prev</a>
    <span>2 / 3</span>
    <a href="#a3">Next</a>
  </div>
</section>

<section id="a3" class="page">
  <h1>Bagian A</h1>

  <div class="nav-btn">
    <a href="#a2">Prev</a>
    <span>3 / 3</span>
  </div>
</section>

<!-- ===== SECTION B (RESET NOMOR) ===== -->

<section id="b1" class="page">
  <h1>Bagian B</h1>

  <div class="nav-btn">
    <span>1 / 2</span>
    <a href="#b2">Next</a>
  </div>
</section>

<section id="b2" class="page">
  <h1>Bagian B</h1>

  <div class="nav-btn">
    <a href="#b1">Prev</a>
    <span>2 / 2</span>
  </div>
</section>

<!-- HOME BUTTON -->
<a href="#home" class="home-button">
  <svg viewBox="0 0 24 24" width="22" height="22">
    <path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z" fill="black"/>
  </svg>
</a>

</body>
</html>
