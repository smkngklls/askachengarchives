<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>arsip-pesan-anonim</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      padding: 15px;
      margin: 0;
    }

    iframe {
      width: 100%;
      height: 85vh;
      border: none;
      background: white;
    }

    .nav {
      padding: 10px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      background: black;
      color: white;
      border-radius: 8px;
      font-size: 14px;
    }

    button:disabled {
      opacity: 0.4;
    }
  </style>
</head>

<body>

<h1>arsip-pesan-anonim</h1>

<iframe id="viewer" src="1retro.html"></iframe>

<div class="nav">
  <button id="prevBtn" onclick="prev()">⬅ Prev</button>
  <span id="page">1</span>
  <button id="nextBtn" onclick="next()">Next ➡</button>
</div>

<script>
let current = 1;

async function fileExists(num) {
  try {
    const res = await fetch(num + "retro.html");
    return res.ok;
  } catch {
    return false;
  }
}

async function update() {
  document.getElementById("viewer").src = current + "retro.html";
  document.getElementById("page").textContent = current;

  // disable prev kalau di halaman 1
  document.getElementById("prevBtn").disabled = current === 1;

  // cek apakah next ada
  const nextExists = await fileExists(current + 1);
  document.getElementById("nextBtn").disabled = !nextExists;
}

async function next() {
  if (await fileExists(current + 1)) {
    current++;
    update();
  }
}

function prev() {
  if (current > 1) {
    current--;
    update();
  }
}

// jalankan saat pertama buka
update();
</script>

</body>
</html>
