<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>askacheng.archives</title>

<style>
body {
  margin: 0;
  background: #008080;
  font-family: Tahoma, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* WINDOW */
.window {
  width: 380px;
  background: #c0c0c0;
  border: 2px solid #000;
  box-shadow: 3px 3px #000;
}

/* TITLE BAR */
.title-bar {
  background: linear-gradient(to right, #000080, #1084d0);
  color: white;
  padding: 3px 6px;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
}

.title-bar span {
  font-weight: bold;
}

/* BODY */
.window-body {
  background: white;
  padding: 10px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

/* FILE */
.file {
  text-align: center;
  font-size: 12px;
  cursor: pointer;
  color: black;
  text-decoration: none;
}

.file div {
  font-size: 32px;
}

/* CLICK EFFECT */
.file:active {
  background: #000080;
  color: white;
}
</style>
</head>

<body>

<div class="window">

  <div class="title-bar">
    <span>askacheng.archives</span>
    <div>🗕 🗖 ✕</div>
  </div>

  <div class="window-body">

    <div class="grid">

      <a href="retrospring.html" class="file">
        <div>📁</div>
        retrospring
      </a>

      <a href="secreto.html" class="file">
        <div>📁</div>
        secreto
      </a>

      <a href="curiouscat.html" class="file">
        <div>📁</div>
        curiouscat
      </a>

      <a href="tellonym.html" class="file">
        <div>📁</div>
        tellonym
      </a>

    </div>

  </div>

</div>

</body>
</html>
