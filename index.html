<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>arsip-pesan-anonim</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      padding: 15px;
      margin: 0;
    }

    iframe {
      width: 100%;
      height: 85vh;
      border: none;
      background: white;
    }

    .nav {
      padding: 10px;
    }

    button {
      padding: 8px 12px;
      margin: 3px;
      border: none;
      background: black;
      color: white;
      border-radius: 6px;
      font-size: 13px;
    }

    button.active {
      background: #666;
    }

    button:disabled {
      opacity: 0.4;
    }
  </style>
</head>

<body>

<h1>arsip-pesan-anonim</h1>

<iframe id="viewer" src="1retro.html"></iframe>

<div class="nav">
  <button id="prevBtn" onclick="prev()">⬅</button>
  <span id="numbers"></span>
  <button id="nextBtn" onclick="next()">➡</button>
</div>

<script>
let current = 1;
let maxPage = 1;

async function fileExists(num) {
  try {
    const res = await fetch(num + "retro.html");
    return res.ok;
  } catch {
    return false;
  }
}

// DETECT JUMLAH FILE OTOMATIS
async function detectPages() {
  let i = 1;
  while (await fileExists(i)) {
    i++;
  }
  maxPage = i - 1;
  renderNumbers();
}

// TAMPILKAN NOMOR
function renderNumbers() {
  const container = document.getElementById("numbers");
  container.innerHTML = "";

  for (let i = 1; i <= maxPage; i++) {
    const btn = document.createElement("button");
    btn.textContent = i;

    if (i === current) {
      btn.classList.add("active");
    }

    btn.onclick = () => {
      current = i;
      update();
    };

    container.appendChild(btn);
  }
}

// UPDATE HALAMAN
function update() {
  document.getElementById("viewer").src = current + "retro.html";

  document.getElementById("prevBtn").disabled = current === 1;
  document.getElementById("nextBtn").disabled = current === maxPage;

  renderNumbers();
}

function next() {
  if (current < maxPage) {
    current++;
    update();
  }
}

function prev() {
  if (current > 1) {
    current--;
    update();
  }
}

// INIT
(async () => {
  await detectPages();
  update();
})();
</script>

</body>
</html>
