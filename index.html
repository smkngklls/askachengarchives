<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>askacheng.archives</title>

<style>

/* ===== CHICAGO FONT (CDN) ===== */
@font-face {
  font-family: 'Chicago';
  src: url('https://cdn.jsdelivr.net/gh/ctrlcctrlv/chicago-font@master/chicago.woff') format('woff');
}

/* ===== BODY ===== */
body {
  margin: 0;
  background: #3c7fb1;
  font-family: 'Chicago', Geneva, Tahoma, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* ===== WINDOW ===== */
.window {
  width: 420px;
  max-width: 90%;
  background: #d6d6d6;
  border: 2px solid #000;
  border-radius: 6px;
}

/* ===== TITLE BAR ===== */
.title-bar {
  background: linear-gradient(#eeeeee, #cfcfcf);
  padding: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  font-size: 13px;
  font-weight: bold;
}

/* ===== MAC BUTTONS ===== */
.buttons {
  position: absolute;
  left: 6px;
}

.btn {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 4px;
}

.red { background: #ff5f56; }
.yellow { background: #ffbd2e; }
.green { background: #27c93f; }

/* ===== BODY CONTENT ===== */
.window-body {
  background: #fff;
  padding: 10px;
}

/* ===== FILE LIST ===== */
.file {
  display: flex;
  align-items: center;
  padding: 6px;
  font-size: 13px;
  text-decoration: none;
  color: black;
}

/* ICON */
.file::before {
  content: "📁";
  margin-right: 8px;
}

/* HOVER (MAC STYLE SELECT) */
.file:hover {
  background: #3875d7;
  color: white;
}

/* ===== STATUS BAR ===== */
.status {
  font-size: 11px;
  padding: 4px 6px;
  background: #e0e0e0;
  border-top: 1px solid #aaa;
}

</style>
</head>

<body>

<div class="window">

  <div class="title-bar">
    <div class="buttons">
      <span class="btn red"></span>
      <span class="btn yellow"></span>
      <span class="btn green"></span>
    </div>
    askacheng.archives
  </div>

  <div class="window-body">
    <a href="retrospring.html" class="file">Retrospring</a>
    <a href="secreto.html" class="file">Secreto</a>
    <a href="curiouscat.html" class="file">CuriousCat</a>
    <a href="tellonym.html" class="file">Tellonym</a>
  </div>

  <div class="status">
    4 items
  </div>

</div>

</body>
</html>
