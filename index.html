<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>arsip-pesan-anonim</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: -apple-system, sans-serif;
    }

    h1 {
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      margin-bottom: 20px;
      background: white;
    }
  </style>
</head>

<body>

<h1>arsip-pesan-anonim</h1>
<div id="container"></div>

<script>
const container = document.getElementById("container");

async function loadAll() {
  let i = 1;

  while (true) {
    try {
      const res = await fetch(i + "retro.html");

      // kalau file tidak ada → stop
      if (!res.ok) break;

      const iframe = document.createElement("iframe");
      iframe.src = i + "retro.html";

      container.appendChild(iframe);

      i++;
    } catch {
      break;
    }
  }
}

loadAll();
</script>

</body>
</html>
