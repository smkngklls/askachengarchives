<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>askacheng.archives</title>

<style>
body {
  margin: 0;
  background: #3a6ea5; /* XP-ish blue */
  font-family: Tahoma, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* WINDOW */
.window {
  width: 460px;
  max-width: 90%;     /* biar tidak mentok di HP */
  margin: 40px auto;  /* jarak atas & tengah */
  background: #ece9d8;
  border: 1px solid #000;
}

/* TITLE BAR */
.title-bar {
  background: linear-gradient(to right, #0a246a, #3a6ea5);
  color: white;
  padding: 4px 6px;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title-bar span {
  font-weight: bold;
}

/* MENU BAR */
.menu {
  background: #ece9d8;
  border-bottom: 1px solid #aca899;
  font-size: 12px;
  padding: 2px 6px;
}

.menu span {
  margin-right: 12px;
}

/* BODY */
.window-body {
  background: white;
  padding: 6px;
}

/* FILE LIST */
.file {
  display: flex;
  align-items: center;
  padding: 4px 6px;
  font-size: 13px;
  text-decoration: none;
  color: black;
}

/* FOLDER ICON */
.file::before {
  content: "";
  width: 16px;
  height: 12px;
  background: #f4d36b;
  border: 1px solid #caa24a;
  margin-right: 8px;
}

/* HOVER */
.file:hover {
  background: #316ac5;
  color: white;
}

/* STATUS BAR */
.status {
  display: flex;
  border-top: 1px solid #aca899;
  font-size: 11px;
}

.status div {
  flex: 1;
  padding: 2px 6px;
}
</style>
</head>

<body>

<div class="window">

  <div class="title-bar">
    <span>askacheng.archives</span>
    <div>— □ ✕</div>
  </div>

  <div class="menu">
    <span>File</span>
    <span>Edit</span>
    <span>View</span>
    <span>Favorites</span>
    <span>Tools</span>
    <span>Help</span>
  </div>

  <div class="window-body">

    <a href="retrospring.html" class="file">Retrospring</a>
    <a href="secreto.html" class="file">Secreto</a>
    <a href="cc.html" class="file">CuriousCat</a>
    <a href="tellonym.html" class="file">Tellonym</a>

  </div>

  <div class="status">
    <div>4 object(s)</div>
    <div></div>
  </div>

</div>

</body>
</html>
