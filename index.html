<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Anonymous Board Archives</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: sans-serif;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }
  </style>
</head>

<body>

<h1>📩 Anonymous Board Archives</h1>
<div class="container" id="content">Loading...</div>

<script>
const total = 31;
const container = document.getElementById("content");

async function loadPages() {
  container.innerHTML = "";

  for (let i = 1; i <= total; i++) {
    try {
      const res = await fetch("./" + i + "retro.html");
      const text = await res.text();

      // parsing HTML pakai DOM (lebih kuat dari regex)
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, "text/html");

      const bodyContent = doc.body.innerHTML;

      const div = document.createElement("div");
      div.style.marginBottom = "30px";
      div.innerHTML = bodyContent;

      container.appendChild(div);

    } catch (err) {
      console.log("Error:", i);
    }
  }
}

loadPages();
</script>

</body>
</html>
