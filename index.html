<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Anonymous Board Archives</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    h1 {
      text-align: center;
      padding: 20px 10px;
      margin: 0;
      font-size: 20px;
    }

    .frame {
      width: 100%;
      height: 100vh;
      border: none;
      margin-bottom: 20px;
      background: white;
    }
  </style>
</head>

<body>

  <h1>📩 Anonymous Board Archives</h1>

  <script>
    const total = 32; // jumlah file kamu sekarang

    for (let i = 1; i <= total; i++) {
      const iframe = document.createElement("iframe");
      iframe.src = i + "retro.html";
      iframe.className = "frame";
      document.body.appendChild(iframe);
    }
  </script>

</body>
</html>
