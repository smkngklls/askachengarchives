<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Anonymous Board Archives</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: -apple-system, sans-serif;
    }

    h1 {
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    .section {
      margin-bottom: 30px;
    }
  </style>
</head>

<body>

<h1>📩 Anonymous Board Archives</h1>

<div class="container" id="content"></div>

<script>
const total = 31;
const container = document.getElementById("content");

async function loadPages() {
  for (let i = 1; i <= total; i++) {
    try {
      const res = await fetch(i + "retro.html");
      const text = await res.text();

      // Ambil isi body
      const match = text.match(/<body[^>]*>([\s\S]*?)<\/body>/i);

      if (match) {
        const section = document.createElement("div");
        section.className = "section";
        section.innerHTML = match[1];

        container.appendChild(section);
      }

    } catch (e) {
      console.log("Gagal load:", i);
    }
  }
}

loadPages();
</script>

</body>
</html>
