  display: flex;
  justify-content: center;

/* ===== WINDOW ===== */
.window {

/* ===== TITLE BAR ===== */
.title-bar {
  background: linear-gradient(to right, #000080, #1084d0);

  align-items: center;

.controls button {

}

/* ===== BODY ===== */
.window-body {
  background: #fff;
  padding: 6px;

/* ===== FILE LIST ===== */
.file {
  display: flex;
  align-items: center;
  padding: 3px 6px;
  font-size: 13px;
  text-decoration: none;
  color: #000;
}

/* ICON (tanpa gambar, pakai emoji) */
.file::before {
  content: "📁";
  margin-right: 6px;
}

/* SELECT / HOVER ala Explorer */
.file:hover,
.file:active {
  background: #000080;
  color: #fff;
}

/* ===== STATUS BAR ===== */
.status {
  display: flex;
  border-top: 2px solid #808080;
  font-size: 11px;
}
.status div {
  flex: 1;
  padding: 2px 4px;
  border-left: 2px solid #fff;
  border-right: 2px solid #808080;
}
