body {

/* ICON */

  margin-right: 6px;
}

/* CLICK EFFECT */

  color: white;

/* ===== STATUS BAR ===== */

  border-top: 2px solid #808080;
  font-size: 11px;
}

.status div {

  padding: 2px 4px;
